<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DCA Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; padding: 24px; max-width: 1200px; margin: 0 auto; }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    .subtitle { color: #8b949e; font-size: 0.85rem; margin-bottom: 20px; }
    .cards { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .card { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 14px 18px; min-width: 140px; flex: 1; }
    .card-label { color: #8b949e; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .card-value { font-size: 1.2rem; font-weight: 600; }
    .positive { color: #3fb950; }
    .negative { color: #f85149; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-bottom: 20px; }
    th, td { text-align: left; padding: 7px 10px; border-bottom: 1px solid #21262d; }
    th { color: #8b949e; font-weight: 600; position: sticky; top: 0; background: #0d1117; }
    tr:hover { background: #161b22; }
    .status-filled { color: #3fb950; font-weight: 600; }
    .status-error { color: #f85149; font-weight: 600; }
    .filter-bar { margin-bottom: 12px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .filter-bar select { background: #161b22; border: 1px solid #21262d; color: #c9d1d9; padding: 5px 10px; border-radius: 6px; font-size: 0.8rem; }
    .empty { text-align: center; padding: 40px; color: #484f58; }
    .run-header { background: #161b22; font-weight: 600; }
    .run-header td { border-bottom: 2px solid #30363d; padding: 8px 10px; }
    .tag-dca { display: inline-block; background: #1f6feb33; color: #58a6ff; padding: 2px 8px; border-radius: 4px; font-size: 0.68rem; font-weight: 600; }
    .tag-dip { display: inline-block; background: #d2992233; color: #d29922; padding: 2px 8px; border-radius: 4px; font-size: 0.68rem; font-weight: 600; }
    .tag-deadline { display: inline-block; background: #484f5833; color: #8b949e; padding: 2px 8px; border-radius: 4px; font-size: 0.68rem; font-weight: 600; }
    .tag-target { display: inline-block; background: #3fb95022; color: #3fb950; padding: 2px 8px; border-radius: 4px; font-size: 0.68rem; font-weight: 600; }
    .tag-first { display: inline-block; background: #bc8cff22; color: #bc8cff; padding: 2px 8px; border-radius: 4px; font-size: 0.68rem; font-weight: 600; }
    .alloc-section { display: flex; gap: 32px; margin-bottom: 24px; align-items: center; flex-wrap: wrap; }
    .alloc-chart { position: relative; width: 200px; height: 200px; flex-shrink: 0; }
    .alloc-chart canvas { width: 200px; height: 200px; }
    .alloc-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    .alloc-center .amount { font-size: 1.1rem; font-weight: 700; }
    .alloc-center .label { font-size: 0.68rem; color: #8b949e; }
    .alloc-legend { display: flex; flex-direction: column; gap: 5px; }
    .alloc-row { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; }
    .alloc-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
    .alloc-name { min-width: 90px; }
    .alloc-val { color: #8b949e; min-width: 60px; text-align: right; }
    .alloc-pct { font-weight: 600; min-width: 42px; text-align: right; }
    section { margin-bottom: 24px; }
    section h2 { font-size: 0.95rem; margin-bottom: 10px; border-bottom: 1px solid #21262d; padding-bottom: 6px; color: #8b949e; font-weight: 600; }
    .hunt-waiting { color: #d29922; font-weight: 600; }
    .hunt-done { color: #3fb950; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Hyperliquid DCA Dashboard</h1>
  <div class="subtitle">Smart DCA — $15 margin/asset, 3x leverage | buys on dips, deadline 19:00 UTC</div>

  <div class="cards">
    <div class="card"><div class="card-label">Margin Invested</div><div class="card-value" id="marginInvested">—</div></div>
    <div class="card"><div class="card-label">Total Notional</div><div class="card-value" id="totalNotional">—</div></div>
    <div class="card"><div class="card-label">Trades</div><div class="card-value" id="filledFailed">—</div></div>
    <div class="card"><div class="card-label">Last Trade</div><div class="card-value" id="lastRun">—</div></div>
    <div class="card"><div class="card-label">Next Check</div><div class="card-value" id="nextRun">—</div></div>
    <div class="card"><div class="card-label">Deadline</div><div class="card-value" id="deadlineIn">—</div></div>
  </div>

  <section>
    <h2>Dip Hunting — Current 24h Window</h2>
    <div id="huntStatus"><div class="empty">Loading...</div></div>
  </section>

  <section>
    <h2>Portfolio (Live)</h2>
    <div class="alloc-section">
      <div class="alloc-chart"><canvas id="pieChart" width="200" height="200"></canvas><div class="alloc-center"><div class="amount" id="allocTotal">—</div><div class="label">live notional</div></div></div>
      <div class="alloc-legend" id="allocLegend"></div>
    </div>
  </section>

  <section>
    <h2>Trade History</h2>
    <div class="filter-bar">
      <select id="filterAsset"><option value="">All Assets</option></select>
      <select id="filterStatus"><option value="">All</option><option value="filled">Filled</option><option value="error">Error</option></select>
      <select id="filterType"><option value="">All</option><option value="dca">DCA</option><option value="dip">Dip Buy</option></select>
    </div>
    <div id="content"><div class="empty">Loading...</div></div>
  </section>

  <script>
    const REPO = 'abhinxx/hyperliquid-dca';
    const HISTORY_URL = `https://raw.githubusercontent.com/${REPO}/main/bot/logs/history.json?t=${Date.now()}`;
    const CONFIG_URL = `https://raw.githubusercontent.com/${REPO}/main/bot/config.json?t=${Date.now()}`;
    const HL_API = 'https://api.hyperliquid.xyz/info';
    const WALLET = '0x8256E29428Ff7b448a9B636151d9e73788459e83';
    const DEXES = ['', 'xyz', 'vntl'];
    const COLORS = ['#58a6ff', '#3fb950', '#d29922', '#f85149', '#bc8cff', '#f778ba', '#79c0ff', '#ffa657', '#7ee787', '#d2a8ff'];
    const WINDOW_START_HOUR = 20;
    const DEADLINE_HOUR = 19;
    let allData = [], config = null;

    async function hlPost(body) {
      return fetch(HL_API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }).then(r => r.json());
    }

    async function fetchLivePositions() {
      const positions = [];
      for (const dex of DEXES) {
        const body = { type: 'clearinghouseState', user: WALLET };
        if (dex) body.dex = dex;
        try {
          const state = await hlPost(body);
          for (const ap of (state.assetPositions || [])) {
            const p = ap.position; const szi = parseFloat(p.szi); if (szi === 0) continue;
            positions.push({ coin: p.coin, size: Math.abs(szi), entryPx: parseFloat(p.entryPx),
              positionValue: parseFloat(p.positionValue), unrealizedPnl: parseFloat(p.unrealizedPnl), marginUsed: parseFloat(p.marginUsed || 0) });
          }
        } catch (e) {}
      }
      return positions;
    }

    function getWindowStart(now) {
      const ws = new Date(now); ws.setUTCHours(WINDOW_START_HOUR, 0, 0, 0);
      if (now < ws) ws.setUTCDate(ws.getUTCDate() - 1);
      return ws;
    }

    function lastEntryPrice(coin) {
      for (let i = allData.length - 1; i >= 0; i--)
        for (const t of (allData[i].trades || []))
          if (t.coin === coin && t.status === 'filled' && t.price) return parseFloat(t.price);
      return null;
    }

    function boughtInWindow(coin, windowStart) {
      for (let i = allData.length - 1; i >= 0; i--) {
        const run = allData[i]; if (run.type !== 'dca') continue;
        if (new Date(run.timestamp) < windowStart) break;
        for (const t of (run.trades || []))
          if (t.coin === coin && t.status === 'filled') return t;
      }
      return null;
    }

    async function renderHuntStatus() {
      if (!config || !allData) return;
      const now = new Date();
      const windowStart = getWindowStart(now);
      const [mN, mX, mV] = await Promise.all([hlPost({type:'allMids'}), hlPost({type:'allMids',dex:'xyz'}), hlPost({type:'allMids',dex:'vntl'})]);
      const allMids = { ...mN, ...mX, ...mV };

      let html = '<table><thead><tr><th>Asset</th><th>Status</th><th>Threshold</th><th>Buy Target</th><th>Current Price</th></tr></thead><tbody>';
      for (const asset of config.assets) {
        const coin = asset.coin;
        const threshold = asset.intraday_drop || 0.03;
        const bought = boughtInWindow(coin, windowStart);
        const refPrice = lastEntryPrice(coin);
        const current = parseFloat(allMids[coin] || 0);

        if (bought) {
          html += `<tr><td>${coin}</td><td><span class="hunt-done">DONE</span></td>`;
          html += `<td>${(threshold*100).toFixed(1)}%</td>`;
          html += `<td>—</td>`;
          html += `<td>$${current.toLocaleString()}</td></tr>`;
        } else if (refPrice && current) {
          const target = refPrice * (1 - threshold);
          html += `<tr><td>${coin}</td><td><span class="hunt-waiting">HUNTING</span></td>`;
          html += `<td>${(threshold*100).toFixed(1)}%</td>`;
          html += `<td>$${target.toLocaleString()}</td>`;
          html += `<td>$${current.toLocaleString()}</td></tr>`;
        } else {
          html += `<tr><td>${coin}</td><td><span class="tag-first">FIRST</span></td>`;
          html += `<td>${(threshold*100).toFixed(1)}%</td><td>—</td>`;
          html += `<td>${current ? '$'+current.toLocaleString() : '—'}</td></tr>`;
        }
      }
      html += '</tbody></table>';
      document.getElementById('huntStatus').innerHTML = html;
    }

    async function load() {
      const [historyResult, positions, configResult] = await Promise.all([
        fetch(HISTORY_URL).then(r => r.ok ? r.json() : []).catch(() => []),
        fetchLivePositions(),
        fetch(CONFIG_URL).then(r => r.ok ? r.json() : null).catch(() => null),
      ]);
      allData = historyResult; config = configResult;

      drawAllocation(positions);
      renderHuntStatus();

      if (!allData.length) { document.getElementById('content').innerHTML = '<div class="empty">No trades yet</div>'; return; }

      const coins = new Set();
      let totalFilled = 0, totalFailed = 0, totalNotional = 0, totalMargin = 0;
      const leverage = config ? config.leverage : 3;
      for (const run of allData) {
        for (const t of run.trades || []) {
          coins.add(t.coin);
          if (t.status === 'filled') { totalFilled++; const ntl = parseFloat(t.notional || 0); totalNotional += ntl; totalMargin += ntl / leverage; }
          else totalFailed++;
        }
      }

      document.getElementById('marginInvested').textContent = `$${totalMargin.toFixed(0)}`;
      document.getElementById('totalNotional').textContent = `$${totalNotional.toFixed(0)}`;
      document.getElementById('filledFailed').innerHTML = `<span class="positive">${totalFilled}</span> / <span class="negative">${totalFailed}</span>`;
      const last = allData[allData.length - 1];
      document.getElementById('lastRun').textContent = new Date(last.timestamp).toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

      const sel = document.getElementById('filterAsset');
      for (const c of [...coins].sort()) { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); }

      renderTable();
      document.getElementById('filterAsset').addEventListener('change', renderTable);
      document.getElementById('filterStatus').addEventListener('change', renderTable);
      document.getElementById('filterType').addEventListener('change', renderTable);
    }

    function drawAllocation(positions) {
      if (!positions.length) { document.getElementById('allocLegend').innerHTML = '<div style="color:#484f58">No open positions</div>'; return; }
      const sorted = positions.sort((a, b) => b.positionValue - a.positionValue);
      const total = sorted.reduce((s, p) => s + p.positionValue, 0);
      const totalMargin = sorted.reduce((s, p) => s + p.marginUsed, 0);
      const totalPnl = sorted.reduce((s, p) => s + p.unrealizedPnl, 0);
      const pnlCls = totalPnl >= 0 ? 'positive' : 'negative';
      document.getElementById('allocTotal').innerHTML = `$${total.toFixed(0)}<div class="label ${pnlCls}" style="font-size:0.72rem;font-weight:600">${totalPnl >= 0 ? '+' : ''}$${totalPnl.toFixed(2)}</div>`;
      const canvas = document.getElementById('pieChart');
      const ctx = canvas.getContext('2d');
      const cx = 100, cy = 100, r = 85, inner = 55;
      ctx.clearRect(0, 0, 200, 200);
      let startAngle = -Math.PI / 2;
      const legend = document.getElementById('allocLegend');
      legend.innerHTML = '';
      sorted.forEach((pos, i) => {
        const pct = total > 0 ? pos.positionValue / total : 0;
        const sweep = pct * 2 * Math.PI;
        const color = COLORS[i % COLORS.length];
        ctx.beginPath(); ctx.moveTo(cx + inner * Math.cos(startAngle), cy + inner * Math.sin(startAngle));
        ctx.arc(cx, cy, r, startAngle, startAngle + sweep); ctx.arc(cx, cy, inner, startAngle + sweep, startAngle, true);
        ctx.closePath(); ctx.fillStyle = color; ctx.fill(); startAngle += sweep;
        const pnlColor = pos.unrealizedPnl >= 0 ? '#3fb950' : '#f85149';
        const row = document.createElement('div'); row.className = 'alloc-row';
        row.innerHTML = `<div class="alloc-dot" style="background:${color}"></div><div class="alloc-name">${pos.coin}</div><div class="alloc-val">$${pos.positionValue.toFixed(0)}</div><div class="alloc-pct">${(pct*100).toFixed(1)}%</div><div style="min-width:55px;text-align:right;font-size:0.75rem;color:${pnlColor}">${pos.unrealizedPnl >= 0 ? '+' : ''}$${pos.unrealizedPnl.toFixed(2)}</div>`;
        legend.appendChild(row);
      });
    }

    function renderTable() {
      const fA = document.getElementById('filterAsset').value;
      const fS = document.getElementById('filterStatus').value;
      const fT = document.getElementById('filterType').value;
      let html = '<table><thead><tr><th>Date</th><th>Type</th><th>Trigger</th><th>Asset</th><th>Status</th><th>Size</th><th>Price</th><th>Notional</th><th>Drop</th><th>Error</th></tr></thead><tbody>';
      for (const run of [...allData].reverse()) {
        const rt = run.type || 'dca';
        if (fT && rt !== fT) continue;
        const ts = new Date(run.timestamp).toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
        const trades = (run.trades||[]).filter(t => (!fA || t.coin===fA) && (!fS || t.status===fS));
        if (!trades.length) continue;
        const typeTag = rt === 'dip' ? '<span class="tag-dip">DIP</span>' : '<span class="tag-dca">DCA</span>';
        html += `<tr class="run-header"><td colspan="10">${typeTag} ${ts} — USDC: $${run.usdc_balance_before??'?'} → $${run.usdc_balance_after??'?'}</td></tr>`;
        for (const t of trades) {
          const cls = t.status === 'filled' ? 'status-filled' : 'status-error';
          const trig = t.trigger || '—';
          const trigCls = trig === 'DIP_TARGET' ? 'tag-target' : trig === 'DEADLINE' ? 'tag-deadline' : trig === 'FIRST' ? 'tag-first' : 'tag-dca';
          html += `<tr><td>${ts}</td><td>${typeTag}</td><td><span class="${trigCls}">${trig}</span></td><td>${t.coin}</td><td class="${cls}">${t.status}</td><td>${t.size||'—'}</td><td>${t.price?'$'+parseFloat(t.price).toLocaleString():'—'}</td><td>${t.notional?'$'+t.notional:'—'}</td><td>${t.drop_pct?`-${(t.drop_pct*100).toFixed(1)}%`:'—'}</td><td style="color:#f85149;font-size:0.72rem">${t.error||''}</td></tr>`;
        }
      }
      html += '</tbody></table>';
      if (html.includes('<tbody></tbody>')) html = '<div class="empty">No matching trades</div>';
      document.getElementById('content').innerHTML = html;
    }

    function updateTimers() {
      const now = new Date();
      const next = new Date(now); next.setUTCMinutes(45, 0, 0);
      if (now >= next) next.setUTCHours(next.getUTCHours() + 1);
      const cd = next - now;
      document.getElementById('nextRun').textContent = `${String(Math.floor(cd/60000)).padStart(2,'0')}m ${String(Math.floor((cd%60000)/1000)).padStart(2,'0')}s`;
      const dl = new Date(now); dl.setUTCHours(DEADLINE_HOUR, 0, 0, 0);
      if (now >= dl) dl.setUTCDate(dl.getUTCDate() + 1);
      const dd = dl - now;
      document.getElementById('deadlineIn').textContent = `${String(Math.floor(dd/3600000)).padStart(2,'0')}h ${String(Math.floor((dd%3600000)/60000)).padStart(2,'0')}m`;
    }

    load();
    updateTimers();
    setInterval(updateTimers, 1000);
    setInterval(renderHuntStatus, 60000);
  </script>
</body>
</html>
