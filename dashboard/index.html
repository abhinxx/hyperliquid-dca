<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DCA Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; padding: 24px; max-width: 1200px; margin: 0 auto; }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    .subtitle { color: #8b949e; font-size: 0.85rem; margin-bottom: 20px; }
    .cards { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .card { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 16px 20px; min-width: 180px; flex: 1; }
    .card-label { color: #8b949e; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .card-value { font-size: 1.3rem; font-weight: 600; }
    .positive { color: #3fb950; }
    .negative { color: #f85149; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin-bottom: 24px; }
    th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid #21262d; }
    th { color: #8b949e; font-weight: 600; position: sticky; top: 0; background: #0d1117; }
    tr:hover { background: #161b22; }
    .status-filled { color: #3fb950; font-weight: 600; }
    .status-error { color: #f85149; font-weight: 600; }
    .filter-bar { margin-bottom: 16px; display: flex; gap: 12px; align-items: center; }
    .filter-bar select { background: #161b22; border: 1px solid #21262d; color: #c9d1d9; padding: 6px 12px; border-radius: 6px; font-size: 0.82rem; }
    .empty { text-align: center; padding: 60px; color: #484f58; }
    .run-header { background: #161b22; font-weight: 600; }
    .run-header td { border-bottom: 2px solid #30363d; padding: 10px 12px; }
    .tag-dca { display: inline-block; background: #1f6feb33; color: #58a6ff; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
    .tag-dip { display: inline-block; background: #d2992233; color: #d29922; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
    .alloc-section { display: flex; gap: 32px; margin-bottom: 32px; align-items: center; flex-wrap: wrap; }
    .alloc-chart { position: relative; width: 220px; height: 220px; flex-shrink: 0; }
    .alloc-chart canvas { width: 220px; height: 220px; }
    .alloc-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    .alloc-center .amount { font-size: 1.2rem; font-weight: 700; }
    .alloc-center .label { font-size: 0.7rem; color: #8b949e; }
    .alloc-legend { display: flex; flex-direction: column; gap: 6px; }
    .alloc-row { display: flex; align-items: center; gap: 10px; font-size: 0.82rem; }
    .alloc-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
    .alloc-name { min-width: 100px; }
    .alloc-val { color: #8b949e; min-width: 70px; text-align: right; }
    .alloc-pct { font-weight: 600; min-width: 45px; text-align: right; }
    section { margin-bottom: 8px; }
    section h2 { font-size: 1rem; margin-bottom: 12px; border-bottom: 1px solid #21262d; padding-bottom: 6px; color: #8b949e; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Hyperliquid DCA Dashboard</h1>
  <div class="subtitle">Smart DCA — $15/asset, 3x leverage, 7 assets | buys on dips, deadline at 19:00 UTC</div>

  <div class="cards">
    <div class="card"><div class="card-label">Total Runs</div><div class="card-value" id="totalRuns">—</div></div>
    <div class="card"><div class="card-label">Total Invested</div><div class="card-value" id="totalInvested">—</div></div>
    <div class="card"><div class="card-label">Filled / Failed</div><div class="card-value" id="filledFailed">—</div></div>
    <div class="card"><div class="card-label">Last Run</div><div class="card-value" id="lastRun">—</div></div>
    <div class="card"><div class="card-label">Next Auto Trade</div><div class="card-value" id="nextRun">—</div></div>
  </div>

  <section>
    <h2>Portfolio Allocation</h2>
    <div class="alloc-section">
      <div class="alloc-chart"><canvas id="pieChart" width="220" height="220"></canvas><div class="alloc-center"><div class="amount" id="allocTotal">—</div><div class="label">live positions</div></div></div>
      <div class="alloc-legend" id="allocLegend"></div>
    </div>
  </section>

  <section>
    <h2>Trade History</h2>
    <div class="filter-bar">
      <select id="filterAsset"><option value="">All Assets</option></select>
      <select id="filterStatus"><option value="">All Statuses</option><option value="filled">Filled</option><option value="error">Error</option></select>
      <select id="filterType"><option value="">All Types</option><option value="dca">DCA</option><option value="dip">Dip Buy</option></select>
    </div>
    <div id="content"><div class="empty">Loading...</div></div>
  </section>

  <script>
    const REPO = 'abhinxx/hyperliquid-dca';
    const HISTORY_URL = `https://raw.githubusercontent.com/${REPO}/main/bot/logs/history.json?t=${Date.now()}`;
    const HL_API = 'https://api.hyperliquid.xyz/info';
    const WALLET = '0x8256E29428Ff7b448a9B636151d9e73788459e83';
    const DEXES = ['', 'xyz', 'vntl'];
    const COLORS = ['#58a6ff', '#3fb950', '#d29922', '#f85149', '#bc8cff', '#f778ba', '#79c0ff', '#ffa657', '#7ee787', '#d2a8ff'];
    let allData = [];

    async function hlPost(body) {
      const res = await fetch(HL_API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      return res.json();
    }

    async function fetchLivePositions() {
      const positions = [];
      for (const dex of DEXES) {
        const body = { type: 'clearinghouseState', user: WALLET };
        if (dex) body.dex = dex;
        try {
          const state = await hlPost(body);
          for (const ap of (state.assetPositions || [])) {
            const p = ap.position;
            const szi = parseFloat(p.szi);
            if (szi === 0) continue;
            positions.push({
              coin: p.coin,
              direction: szi >= 0 ? 'Long' : 'Short',
              size: Math.abs(szi),
              entryPx: parseFloat(p.entryPx),
              positionValue: parseFloat(p.positionValue),
              unrealizedPnl: parseFloat(p.unrealizedPnl),
              leverage: p.leverage,
              marginUsed: parseFloat(p.marginUsed || 0),
            });
          }
        } catch (e) { /* skip failed dex */ }
      }
      return positions;
    }

    async function load() {
      const [historyResult, positions] = await Promise.all([
        fetch(HISTORY_URL).then(r => r.ok ? r.json() : []).catch(() => []),
        fetchLivePositions(),
      ]);
      allData = historyResult;

      // Draw live allocation from API positions
      drawAllocation(positions);

      if (!allData.length) {
        document.getElementById('content').innerHTML = '<div class="empty">No trades yet — waiting for first DCA run</div>';
        return;
      }

      const coins = new Set();
      let totalFilled = 0, totalFailed = 0, totalSpent = 0;
      for (const run of allData) {
        for (const t of run.trades || []) {
          coins.add(t.coin);
          if (t.status === 'filled') { totalFilled++; totalSpent += parseFloat(t.notional || 0); }
          else totalFailed++;
        }
      }

      document.getElementById('totalRuns').textContent = allData.length;
      document.getElementById('totalInvested').textContent = `$${totalSpent.toFixed(0)}`;
      document.getElementById('filledFailed').innerHTML = `<span class="positive">${totalFilled}</span> / <span class="negative">${totalFailed}</span>`;
      const last = allData[allData.length - 1];
      document.getElementById('lastRun').textContent = new Date(last.timestamp).toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

      const sel = document.getElementById('filterAsset');
      for (const c of [...coins].sort()) {
        const o = document.createElement('option');
        o.value = c; o.textContent = c;
        sel.appendChild(o);
      }

      renderTable();
      document.getElementById('filterAsset').addEventListener('change', renderTable);
      document.getElementById('filterStatus').addEventListener('change', renderTable);
      document.getElementById('filterType').addEventListener('change', renderTable);
    }

    function drawAllocation(positions) {
      if (!positions.length) {
        document.getElementById('allocLegend').innerHTML = '<div style="color:#484f58">No open positions</div>';
        return;
      }

      const sorted = positions.sort((a, b) => b.positionValue - a.positionValue);
      const total = sorted.reduce((s, p) => s + p.positionValue, 0);
      const totalPnl = sorted.reduce((s, p) => s + p.unrealizedPnl, 0);
      const pnlCls = totalPnl >= 0 ? 'positive' : 'negative';

      document.getElementById('allocTotal').innerHTML = `$${total.toFixed(0)}<div class="label ${pnlCls}" style="font-size:0.75rem;font-weight:600">${totalPnl >= 0 ? '+' : ''}$${totalPnl.toFixed(2)}</div>`;

      const canvas = document.getElementById('pieChart');
      const ctx = canvas.getContext('2d');
      const cx = 110, cy = 110, r = 90, inner = 60;
      ctx.clearRect(0, 0, 220, 220);

      let startAngle = -Math.PI / 2;
      const legend = document.getElementById('allocLegend');
      legend.innerHTML = '';

      sorted.forEach((pos, i) => {
        const pct = total > 0 ? pos.positionValue / total : 0;
        const sweep = pct * 2 * Math.PI;
        const color = COLORS[i % COLORS.length];

        ctx.beginPath();
        ctx.moveTo(cx + inner * Math.cos(startAngle), cy + inner * Math.sin(startAngle));
        ctx.arc(cx, cy, r, startAngle, startAngle + sweep);
        ctx.arc(cx, cy, inner, startAngle + sweep, startAngle, true);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
        startAngle += sweep;

        const pnlSign = pos.unrealizedPnl >= 0 ? '+' : '';
        const pnlColor = pos.unrealizedPnl >= 0 ? '#3fb950' : '#f85149';
        const row = document.createElement('div');
        row.className = 'alloc-row';
        row.innerHTML = `<div class="alloc-dot" style="background:${color}"></div>`
          + `<div class="alloc-name">${pos.coin}</div>`
          + `<div class="alloc-val">$${pos.positionValue.toFixed(0)}</div>`
          + `<div class="alloc-pct">${(pct * 100).toFixed(1)}%</div>`
          + `<div style="min-width:65px;text-align:right;font-size:0.78rem;color:${pnlColor}">${pnlSign}$${pos.unrealizedPnl.toFixed(2)}</div>`;
        legend.appendChild(row);
      });
    }

    function renderTable() {
      const fAsset = document.getElementById('filterAsset').value;
      const fStatus = document.getElementById('filterStatus').value;
      const fType = document.getElementById('filterType').value;

      let html = '<table><thead><tr><th>Date</th><th>Type</th><th>Asset</th><th>Status</th><th>Size</th><th>Price</th><th>Notional</th><th>Drop</th><th>Error</th></tr></thead><tbody>';

      const runs = [...allData].reverse();
      for (const run of runs) {
        const runType = run.type || 'dca';
        if (fType && runType !== fType) continue;
        const ts = new Date(run.timestamp).toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        const trades = (run.trades || []).filter(t => {
          if (fAsset && t.coin !== fAsset) return false;
          if (fStatus && t.status !== fStatus) return false;
          return true;
        });
        if (!trades.length) continue;

        const tag = runType === 'dip' ? '<span class="tag-dip">DIP</span>' : '<span class="tag-dca">DCA</span>';
        html += `<tr class="run-header"><td colspan="9">${tag} ${ts} — USDC: $${run.usdc_balance_before ?? '?'} → $${run.usdc_balance_after ?? '?'}</td></tr>`;
        for (const t of trades) {
          const cls = t.status === 'filled' ? 'status-filled' : 'status-error';
          const dd = t.drop_pct ? `-${(t.drop_pct * 100).toFixed(1)}%` : t.drawdown ? `${(t.drawdown * 100).toFixed(1)}%` : '—';
          html += '<tr>';
          html += `<td>${ts}</td>`;
          html += `<td>${tag}</td>`;
          html += `<td>${t.coin}</td>`;
          html += `<td class="${cls}">${t.status}</td>`;
          html += `<td>${t.size || '—'}</td>`;
          html += `<td>${t.price ? '$' + parseFloat(t.price).toLocaleString() : '—'}</td>`;
          html += `<td>${t.notional ? '$' + t.notional : '—'}</td>`;
          html += `<td>${dd}</td>`;
          html += `<td style="color:#f85149;font-size:0.75rem">${t.error || ''}</td>`;
          html += '</tr>';
        }
      }
      html += '</tbody></table>';
      if (runs.length === 0 || html.includes('<tbody></tbody>')) html = '<div class="empty">No matching trades</div>';
      document.getElementById('content').innerHTML = html;
    }

    function updateCountdown() {
      const now = new Date();
      const next = new Date(now);
      next.setUTCMinutes(45, 0, 0);
      if (now >= next) next.setUTCHours(next.getUTCHours() + 1);
      const diff = next - now;
      const m = Math.floor(diff / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      const pad = n => String(n).padStart(2, '0');
      document.getElementById('nextRun').textContent = `${pad(m)}m ${pad(s)}s`;
    }

    load();
    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
